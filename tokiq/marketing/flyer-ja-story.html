<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Geist+Mono:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho+B1:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="flyer-base.css" />
<link rel="stylesheet" href="flyer-ja.css" />
<style>
  html,body{width:1080px;height:1920px}
  .wrap{position:relative;z-index:2;height:100%;padding:74px 84px 66px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .wrap > *{flex:none}

  .top{width:100%;display:flex;align-items:center;justify-content:space-between}
  .brand{font-size:60px}
  .top .meta{font-size:16px}
  .rule{margin:22px 0}

  .eyebrow{margin-top:24px;font-family:var(--jp-gothic);font-weight:700;font-size:22px;letter-spacing:.4em;color:var(--cyan)}

  /* vertical brand catchphrase — the hero */
  .vhero{margin-top:34px;font-family:var(--jp-mincho);font-weight:800;font-size:90px;line-height:1.4;
    letter-spacing:.06em;color:var(--ink);height:512px}
  .vhero .ac{color:var(--cyan);text-shadow:0 0 48px rgba(34,211,238,.4)}

  .subhead{margin-top:22px;font-family:var(--jp-gothic);font-weight:500;font-size:30px;line-height:1.5;color:var(--muted)}
  .subhead b{color:var(--ink);font-weight:700}

  .stopwrap{margin-top:40px;margin-bottom:16px;position:relative;display:grid;place-items:center}
  .stopbtn{--d:298px !important}
  .stopcap{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);
    font-family:var(--jp-gothic);font-weight:500;font-size:19px;letter-spacing:.28em;color:var(--muted);white-space:nowrap}

  .scale{width:100%;margin-top:46px}
  .soclose{margin-top:24px;font-family:var(--jp-mincho);font-weight:800;font-size:44px;letter-spacing:.04em}
  .soclose .ac{color:var(--cyan)}

  .botrule{margin-top:auto}
  .bottom{margin-top:34px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:30px}
  .cta-l{display:flex;align-items:center;gap:28px;text-align:left}
  .qrcard{width:188px;height:188px;padding:12px;border-radius:18px}
  .scan{font-family:var(--jp-gothic);font-weight:700;font-size:20px;letter-spacing:.06em;color:var(--cyan)}
  .play{margin-top:8px;font-family:var(--jp-gothic);font-weight:700;font-size:34px;line-height:1.3}
  .play .m{color:var(--muted);font-weight:500}
  .url{margin-top:6px;font-family:var(--font-num);font-weight:700;font-size:27px;color:var(--cyan)}
  .jp{text-align:right}
  .jp .meta{font-size:16px;justify-content:flex-end}
  .jpval{font-weight:800;font-size:46px;color:var(--gold-2);text-shadow:0 0 26px rgba(251,191,36,.42);margin-top:7px;letter-spacing:-.02em}
</style>
</head>
<body class="ja">
  <div class="atmos">
    <div class="grid" style="--grid-x:50%;--grid-y:42%"></div>
    <div class="blob b-cyan" style="width:880px;height:880px;left:50%;top:560px;transform:translateX(-50%)"></div>
    <div class="blob b-fuchsia" style="width:680px;height:680px;right:-220px;top:80px"></div>
    <div class="blob b-blue" style="width:720px;height:720px;left:-240px;bottom:160px"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <span class="reg tl" style="top:44px;left:44px;width:34px;height:34px"></span>
  <span class="reg tr" style="top:44px;right:44px;width:34px;height:34px"></span>
  <span class="reg bl" style="bottom:44px;left:44px;width:34px;height:34px"></span>
  <span class="reg br" style="bottom:44px;right:44px;width:34px;height:34px"></span>

  <div class="wrap">
    <div class="top">
      <div class="brand">TOK<span class="i">I</span>Q</div>
      <div class="meta">
        <span>ラウンド <span class="c">1042</span></span><span class="sep">/</span>
        <span><span class="livedot"></span> 卓に12人</span><span class="sep">/</span>
        <span>公正性証明済み</span>
      </div>
    </div>
    <div class="rule"></div>

    <div class="eyebrow">精密タイミング・バトル</div>
    <div class="vhero vtext"><span class="ac">時を制し、</span><br>共に勝て。</div>
    <div class="subhead">狙った時間ぴったりに、<b>クロックを止めろ</b>。<br>最も近い一人が、<b>賞金プールを総取り</b>。</div>

    <div class="stopwrap">
      <div class="stopbtn">
        <span class="reticle-dash"></span>
        <span class="reticle-solid"></span>
        <span class="tick t"></span><span class="tick b"></span><span class="tick l"></span><span class="tick r"></span>
        <div class="disc"><b>STOP</b></div>
      </div>
      <div class="stopcap">精密 ・ 度胸 ・ タイミング</div>
    </div>

    <div class="scale">
      <div class="ruler">
        <div class="ticks"></div>
        <div class="axis"></div>
        <div class="seg" style="left:41%;width:30%"></div>
        <div class="gap" style="left:56%"><span class="k">誤差</span><span class="v">0.03秒</span></div>
        <div class="mark tgt" style="left:71%"><span class="stem"></span><span class="lab"><span class="k">目標</span><span class="v">10.00s</span></span></div>
        <div class="mark you" style="left:41%"><span class="stem"></span><span class="lab"><span class="k">あなた</span><span class="v">09.97s</span></span></div>
      </div>
    </div>
    <div class="soclose"><span class="ac">惜しい。</span>あと、0.03秒。</div>

    <div class="botrule"></div>
    <div class="rule"></div>
    <div class="bottom">
      <div class="cta-l">
        <div class="qrcard"><img src="__QR_DATA_URI__" alt="今すぐプレイ" /></div>
        <div>
          <div class="scan">【無料】今すぐプレイ</div>
          <div class="play">登録不要<br><span class="m">ブラウザですぐ遊べる</span></div>
          <div class="url">__URL_TEXT__</div>
        </div>
      </div>
      <div class="jp">
        <div class="meta">メガジャックポット</div>
        <div class="jpval">¥1,245,000</div>
      </div>
    </div>
  </div>
</body>
</html>
