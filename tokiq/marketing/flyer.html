<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Geist+Mono:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="flyer-base.css" />
<style>
  html,body{width:1080px;height:1080px}
  .wrap{position:relative;z-index:2;height:100%;padding:64px 72px 60px;display:flex;flex-direction:column;gap:0}

  .top{flex:none;display:flex;align-items:center;justify-content:space-between}
  .brand{font-size:54px}
  .top .meta{font-size:16px}

  .rule{flex:none;margin:22px 0}

  .hero{flex:1;min-height:0;display:flex;align-items:center;gap:24px}
  .col-l{flex:1;min-width:0}
  .eyebrow{font-family:var(--font-num);font-size:18px;letter-spacing:.34em;text-transform:uppercase;color:var(--cyan)}
  .headline{margin-top:18px;font-family:var(--font-display);font-weight:700;font-size:104px;line-height:.92;letter-spacing:-.01em;white-space:nowrap}
  .headline .accent{text-shadow:0 0 40px rgba(34,211,238,.35)}
  .sub{margin-top:22px;font-size:27px;color:var(--muted);max-width:520px;line-height:1.42}
  .sub b{color:var(--ink);font-weight:600}
  .col-r{flex:none;display:grid;place-items:center;width:330px}

  /* ruler block */
  .scale{flex:none;position:relative;margin-top:4px}

  .bottom{flex:none;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
  .cta-l{display:flex;align-items:center;gap:22px}
  .qrcard{width:128px;height:128px;padding:9px;border-radius:14px}
  .scan{font-family:var(--font-num);font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .play{margin-top:7px;font-weight:700;font-size:29px}
  .play .accent{font-weight:700}
  .url{margin-top:5px;font-size:23px}
  .jp{text-align:right}
  .jp .meta{font-size:15px;justify-content:flex-end}
  .jpval{font-family:var(--font-num);font-weight:800;font-size:42px;color:var(--gold-2);text-shadow:0 0 26px rgba(251,191,36,.42);margin-top:6px;letter-spacing:-.02em}
</style>
</head>
<body>
  <div class="atmos">
    <div class="grid" style="--grid-x:76%;--grid-y:42%"></div>
    <div class="blob b-cyan" style="width:720px;height:720px;right:-180px;top:30px"></div>
    <div class="blob b-fuchsia" style="width:660px;height:660px;left:-220px;bottom:-180px"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <span class="reg tl" style="top:40px;left:40px;width:32px;height:32px"></span>
  <span class="reg tr" style="top:40px;right:40px;width:32px;height:32px"></span>
  <span class="reg bl" style="bottom:40px;left:40px;width:32px;height:32px"></span>
  <span class="reg br" style="bottom:40px;right:40px;width:32px;height:32px"></span>

  <div class="wrap">
    <div class="top">
      <div class="brand">TOK<span class="i">I</span>Q</div>
      <div class="meta">
        <span>Round <span class="c">1042</span></span><span class="sep">/</span>
        <span><span class="livedot"></span> 12 at table</span><span class="sep">/</span>
        <span>Provably fair</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="hero">
      <div class="col-l">
        <div class="eyebrow">Social precision timing</div>
        <div class="headline">I&nbsp;was<br><span class="accent">SO close.</span></div>
        <div class="sub">Tap <b>STOP</b> closest to the target time. The closest player wins the whole pool.</div>
      </div>
      <div class="col-r">
        <div class="stopbtn" style="--d:262px">
          <span class="reticle-dash"></span>
          <span class="reticle-solid"></span>
          <span class="tick t"></span><span class="tick b"></span><span class="tick l"></span><span class="tick r"></span>
          <div class="disc"><b>STOP</b></div>
        </div>
      </div>
    </div>

    <div class="scale">
      <div class="ruler">
        <div class="ticks"></div>
        <div class="axis"></div>
        <div class="seg" style="left:41%;width:30%"></div>
        <div class="gap" style="left:56%"><span class="k">off by</span><span class="v">0.03s</span></div>
        <div class="mark tgt" style="left:71%"><span class="stem"></span><span class="lab"><span class="k">Target</span><span class="v">10.00s</span></span></div>
        <div class="mark you" style="left:41%"><span class="stem"></span><span class="lab"><span class="k">Your stop</span><span class="v">09.97s</span></span></div>
      </div>
    </div>

    <div class="rule"></div>

    <div class="bottom">
      <div class="cta-l">
        <div class="qrcard"><img src="__QR_DATA_URI__" alt="Scan to play" /></div>
        <div>
          <div class="scan">Scan / tap to play</div>
          <div class="play"><span class="accent">Free</span> in your browser — no signup</div>
          <div class="url">__URL_TEXT__</div>
        </div>
      </div>
      <div class="jp">
        <div class="meta">Mega Jackpot</div>
        <div class="jpval">¥1,245,000</div>
      </div>
    </div>
  </div>
</body>
</html>
